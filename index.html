<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>やさしい健康ログ</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500&family=Noto+Sans+JP:wght@300;400;500&display=swap" rel="stylesheet">
  
  
  <style>

body {
  font-family: "Noto Sans SC", "PingFang SC", "Microsoft YaHei", "Hiragino Sans GB", sans-serif;
  font-weight: 400;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;

  background: #fff0f5;
  color: #4b2e2e;

  display: flex;
  flex-direction: column;
  align-items: center;
  padding-top: 60px;
  text-align: center;
}
  
  .card {
    background: #fff0f5;
    padding: 20px;
    border-radius: 10px;
    max-width: 420px;
    width: 100%; /* ⭐ 新增（关键） */
    margin: 20px auto;
  }
  
  button {
    margin: 5px;
    padding: 8px;
    border-radius: 8px;
    border: none;
    background: #f7dede;
    cursor: pointer;
  }
  
  .selected {
    background: #f2bcbc;
    border: 2px solid #c08a8a;
  }
  
  .calendar {
    display: grid;
    grid-template-columns: repeat(7,1fr);
    gap: 5px;
  }
  
  .day {
    padding: 8px;
    border-radius: 6px;
    background: #ffe4e1;
    cursor: pointer;
  }
  
  .checked { background: #f2bcbc; }
  .today { border: 2px solid #c08a8a; }
  
  .hidden { display:none; }
  
  #sleep { display:flex; }
  #sleep button { flex:1; font-size:12px; }
  
  textarea {
    width: 85%;
    height: 150px;
    border-radius: 6px;
    padding: 6px;
  }
  
  .section {
    margin-bottom: 16px;
    background: #fff7f9;
  }
  
  button {
    margin: 8px;
  }
  
  /* ⭐ 标题 */
  .section h4 {
    margin: 5px 0 6px;
    font-size: 17px;
    font-weight: 800;
  }
  
  /* ⭐ 内容 */
  .section div {
    margin: 0;
  }
  
  h3 {
    margin-bottom: 12px;
    font-size: 16px;
  }
  
  /* ========================= */
  /* ⭐⭐⭐ 手机适配（新增） ⭐⭐⭐ */
  /* ========================= */
  
  @media (max-width: 480px){
  
    body {
      padding: 10px;
    }
  
    .card {
      padding: 16px;
    }
  
    h3 {
      font-size: 15px;
    }
  
    .section h4 {
      font-size: 14px;
    }
  
    button {
      padding: 10px;
      font-size: 13px;
    }
  
    textarea {
      height: 120px;
    }
  
    .day {
      padding: 6px;
      font-size: 12px;
    }
  
    #sleep button {
      font-size: 11px;
      padding: 8px 4px;
      font-family: "Yu Mincho", "Hiragino Mincho ProN", serif;
    }
  
  }

  .calendar {
  display: grid;
  grid-template-columns: repeat(7, minmax(0,1fr));
  gap: 5px;
}

#note {
  font-family: "Yu Mincho", "Hiragino Mincho ProN", serif;
  font-size: 18px;      /* ⭐ 字体变大 */
  line-height: 1.6;     /* ⭐ 行距更舒服 */
}

#cycle button,
#mood button,
#body button {
  font-family: "Noto Serif JP", "Yu Mincho", serif;
  font-size: 16px;
  font-weight: 500; /* ⭐ 更有“字感” */
  letter-spacing: 0.8px;
}

.lang-switch {
  margin-top: 80px;
  display: flex;
  justify-content: center;
  gap: 8px;
}

/* 中文（强制细） */
:lang(zh) {
  font-family: "Noto Sans SC", "PingFang SC", "Microsoft YaHei", sans-serif;
  font-weight: 300;
}

/* 日文（保持日系书写感，不变细） */
:lang(ja) {
  font-family: "Yu Gothic", "Hiragino Sans", sans-serif;
  font-weight: 600;
}

/* 英文 */
:lang(en) {
  font-family: system-ui, sans-serif;
  font-weight: 400;
}

button, h3, h4, p, div {
  font-family: inherit;
}

#calendarTitle {
  font-weight: 800;
  font-size: 17px;
  letter-spacing: 1px;
}

  </style>
  </head>

<body>
  <body lang="ja">

  <div class="lang-switch">
      <button onclick="setLang('ja')">日本語</button>
      <button onclick="setLang('zh')">中文</button>
      <button onclick="setLang('en')">English</button>
    </div>

  
    <div id="welcomePage" class="card">
      <h3 id="welcomeTitle">お名前</h3>
      <input id="nameInput">
      <br><br>
      <button id="startBtn" onclick="startApp()">やってみる</button>
    </div>

<div id="mainPage" class="card hidden">
  <h3 id="greeting"></h3>
  <div class="calendar" id="calendar"></div>
</div>

<div id="detailPage" class="card hidden">

<div class="section">
<h3 id="calendarTitle">- カレンダ -</h3>
<input type="date" id="datePicker">

<div class="section">
<h4 id="moodTitle">- ココロの状態 -</h4>
<div id="mood">
  <button id="moodHappy" onclick="select(this,'mood',2)">😃ハッピー</button>
  <button id="moodOk" onclick="select(this,'mood',1)">🫤まあまあ</button>
  <button id="moodSad" onclick="select(this,'mood',0)">☹️モヤモヤ</button>
</div>

<div class="section">
<h4 id="bodyTitle">- コンディション -</h4>
<div id="body">
  <button id="bodyShiny" onclick="select(this,'body','元気')">ピカピカ✨</button>
  <button id="bodyCalm" onclick="select(this,'body','普通')">おだやか🍵</button>
  <button id="bodyTired" onclick="select(this,'body','疲れ')">お疲れ🫠</button>
</div>

<div class="section">
<h4 id="sleepTitle">- ねむりの記録 -</h4>
<input id="sleepHours" placeholder="" oninput="analyzeSleep()"> H
<p id="sleepResult" style="font-size:13px; margin-top:6px;"></p>


<div class="section">
<h4 id="cycleTitle">- リズム管理 -</h4>
<button id="cycleSoon" onclick="select(this,'cycle','未開始')">まもなく🙂‍↔️</button>
  
  <input type="date" id="cycleDate">

<div class="section">
<h4 id="noteTitle">- 今日のココロは？ -</h4>
<textarea id="note" placeholder="今日はどんな気持ちでしたか？"></textarea>



<br><br>
<button id="backBtn" onclick="back()">戻る</button>
<button id="deleteBtn" onclick="deleteLog()">この日の記録を削除</button>
<button id="saveBtn" onclick="saveLog()">保存</button>

</div>

<script>

const LANG = {
  ja: {
    name: "お名前",
    start: "やってみる",
    calendar: "- カレンダ -",
    mood: "- ココロの状態 -",
    body: "- コンディション -",
    sleep: "- ねむりの記録 -",
    cycle: "- リズム管理 -",
    noteTitle: "- 今日のココロは？ -",
    note: "今日はどんな気持ちでしたか？",
    back: "戻る",
    save: "保存",
    delete: "この日の記録を削除",
    greeting: "こんにちは",
    happy: "😃ハッピー",
  ok: "🫤まあまあ",
  sad: "☹️モヤモヤ",
  shiny: "ピカピカ✨",
  calm: "おだやか🍵",
  tired: "お疲れ🫠",
  soon: "まもなく🙂‍↔️"
  },

  zh: {
    name: "你的名字",
    start: "开始",
    calendar: "- 日历 -",
    mood: "- 心情状态 -",
    body: "- 身体状态 -",
    sleep: "- 睡眠记录 -",
    cycle: "- 生理周期 -",
    noteTitle: "- 今天感觉如何？ -",
    note: "今天你的心情怎么样？",
    back: "返回",
    save: "保存",
    delete: "删除当天记录",
    greeting: "你好",
    happy: "😃开心",
  ok: "🫤一般",
  sad: "☹️难过",
  shiny: "状态不错✨",
  calm: "平静🍵",
  tired: "疲惫🫠",
  soon: "即将开始"
  },

  en: {
    name: "Your Name",
    start: "Start",
    calendar: "- Calendar -",
    mood: "- Mood -",
    body: "- Condition -",
    sleep: "- Total Sleep -",
    cycle: "- Menstrual Cycle -",
    noteTitle: "- How are you today? -",
    note: "How are you feeling today?",
    back: "Back",
    save: "Save",
    delete: "Delete this record",
    greeting: "Hello",
    happy: "😃Happy",
  ok: "🫤Okay",
  sad: "☹️Down",
  shiny: "Fresh✨",
  calm: "Calm🍵",
  tired: "Tired🫠",
  soon: "Coming soon"
  }
};

let selected = {mood:null, body:"", sleep:"", cycle:""};
let currentDate = "";

/* ⭐ 核心：可取消选择 + 经期互斥 */
function select(btn, group, value){

  // ✔ 再次点击取消
  if(btn.classList.contains("selected")){
    btn.classList.remove("selected");
    selected[group] = group==="mood" ? null : "";
    return;
  }

  // ✔ 单选逻辑
  let buttons = btn.parentNode.getElementsByTagName("button");
  for(let b of buttons){ b.classList.remove("selected"); }

  btn.classList.add("selected");
  selected[group] = value;

  // ⭐ 经期互斥逻辑
  if(group === "cycle"){
    document.getElementById("cycleDate").value = "";
  }
}

/* ⭐ 日期选了 → 自动取消“未开始” */
document.getElementById("cycleDate").addEventListener("change", function(){
  if(this.value){
    selected.cycle = "";

    let btns = document.getElementById("cycle").getElementsByTagName("button");
    for(let b of btns) b.classList.remove("selected");
  }
});

function startApp(){

let name = document.getElementById("nameInput").value;
if(!name) return;

localStorage.setItem("name", name);

// ⭐ 欢迎致辞页面（打字感可以后面再做）
document.getElementById("welcomePage").innerHTML = `
  <h3>${name}さん、ようこそ</h3>
  <p style="font-size:14px; line-height:1.6;">
あなたの毎日を、もっとやさしく。<br>
がんばりすぎなくて大丈夫。<br>
少しずつ、自分を好きになれるように。<br>
ずっと、そばで見守っています。🌿<br><br>
  </p>
  <br>
  <button onclick="enterMain()">はじめる</button>
`;
}

/* 日历 */
function generateCalendar(){

  let cal = document.getElementById("calendar");
  cal.innerHTML = "";

  let today = new Date();
  let year = today.getFullYear();
  let month = today.getMonth();

  let days = new Date(year, month+1, 0).getDate();
  let logs = JSON.parse(localStorage.getItem("logs")) || [];

  for(let i=1;i<=days;i++){

    let d = `${year}-${String(month+1).padStart(2,'0')}-${String(i).padStart(2,'0')}`;

    let div = document.createElement("div");
    div.className = "day";
    div.innerText = i;

    if(logs.find(l=>l.date===d)){
      div.classList.add("checked");
      div.innerText = i + "✓";
    }

    div.onclick = ()=>openDetail(d);
    cal.appendChild(div);
  }
}

/* 进入详情 */
function openDetail(date){

currentDate = date;

document.getElementById("mainPage").classList.add("hidden");
document.getElementById("detailPage").classList.remove("hidden");

document.getElementById("datePicker").value = date;

// ⭐ 1. 每次打开都先彻底清空 UI
selected = {mood:null, body:"", sleep:"", cycle:""};

document.querySelectorAll(".selected").forEach(b=>{
  b.classList.remove("selected");
});

document.getElementById("sleepHours").value = "";
analyzeSleep();
document.getElementById("cycleDate").value = "";
document.getElementById("note").value = "";

// ⭐ 2. 再尝试加载当天已有数据
let logs = JSON.parse(localStorage.getItem("logs")) || [];
let data = logs.find(l => l.date === date);

if(data){

  selected.mood = data.mood;
  selected.body = data.body;
  selected.sleep = data.sleep;
  selected.cycle = data.cycle;

  // 恢复按钮选中状态
  let allBtns = document.querySelectorAll("#detailPage button");

  allBtns.forEach(b=>{
    if(
      b.onclick &&
      b.innerText.includes(data.sleep) ||
      b.innerText.includes(data.cycle) ||
      b.innerText.includes(data.body)
    ){
      b.classList.add("selected");
    }
  });

  document.getElementById("sleepHours").value = data.sleepHours || "";
  document.getElementById("cycleDate").value = data.cycleDate || "";
  document.getElementById("note").value = data.note || "";
}
}

/* 保存 */
function saveLog(){

  let date = document.getElementById("datePicker").value;
  if(!date){ alert("日付を選択してください"); return; }

  if(selected.mood===null){ alert("気分を選択してください"); return; }

  let logs = JSON.parse(localStorage.getItem("logs")) || [];
  logs = logs.filter(l=>l.date!==date);


// ⭐ 删除当天旧数据（核心修复）
logs = logs.filter(l => l.date !== date);

// ⭐ 再写入新数据
logs.push({
  date: date,
  mood: selected.mood,
  body: selected.body,
  sleep: selected.sleep,
  sleepHours: parseFloat(document.getElementById("sleepHours").value) || 0,
  cycle: selected.cycle,
  cycleDate: document.getElementById("cycleDate").value,
  note: document.getElementById("note").value || ""
});

localStorage.setItem("logs", JSON.stringify(logs));

showMain();
}


function showMain(){
  document.getElementById("detailPage").classList.add("hidden");
  document.getElementById("mainPage").classList.remove("hidden");
  generateCalendar();
}

function back(){ showMain(); }

function deleteLog(){

  let date = document.getElementById("datePicker").value;

  if(!date) return;

  let confirmDelete = confirm("この日の記録を削除しますか？");

  if(!confirmDelete) return;

  let logs = JSON.parse(localStorage.getItem("logs")) || [];

  // ⭐ 删除这一天
  logs = logs.filter(l => l.date !== date);

  localStorage.setItem("logs", JSON.stringify(logs));

  // ⭐ 返回主页面刷新
  showMain();
}

window.onload = function(){

let name = localStorage.getItem("name");

if(name){
  // 已有用户 → 直接进入主页面
  document.getElementById("welcomePage").classList.add("hidden");
  document.getElementById("mainPage").classList.remove("hidden");

  document.getElementById("greeting").innerText = name + "さん、こんにちは";
  generateCalendar();

}else{
  // 新用户 → 显示欢迎页
  document.getElementById("welcomePage").classList.remove("hidden");
}
applyLang();
}

function enterMain(){

document.getElementById("welcomePage").classList.add("hidden");
document.getElementById("mainPage").classList.remove("hidden");

let name = localStorage.getItem("name");
document.getElementById("greeting").innerText = name + "さん、こんにちは";

generateCalendar();
}

function analyzeSleep(){

let h = parseFloat(document.getElementById("sleepHours").value);
let result = document.getElementById("sleepResult");

if(!h){
  result.innerText = "";
  selected.sleep = "";
  return;
}

if(h < 5.5){
  selected.sleep = "少ない";
  result.innerText = "🥺 今夜（こんや）は、自分（じぶん）にやさしく。早（はや）めに休（やす）もうね";
}
else if(h <= 7){
  selected.sleep = "普通";
  result.innerText = "🍃 いいリズム ♪ 今日（きょう）も素敵な（すてきな）一日（いちにち）を";
}
else{
  selected.sleep = "多い";
  result.innerText = "🧚‍♀️ たっぷり快眠（かいみん）！今日（きょう）は無敵（むてき）の一日（いちにち）になりそう";
}
}

let currentLang = localStorage.getItem("lang") || "ja";

function setLang(lang){
  currentLang = lang;
  localStorage.setItem("lang", lang);
  document.body.lang = lang;
  applyLang();
}

function applyLang(){

let t = LANG[currentLang];

// welcome
document.getElementById("welcomeTitle").innerText = t.name;
document.getElementById("startBtn").innerText = t.start;

// 标题
document.getElementById("calendarTitle").innerText = t.calendar;
document.getElementById("moodTitle").innerText = t.mood;
document.getElementById("bodyTitle").innerText = t.body;
document.getElementById("sleepTitle").innerText = t.sleep;
document.getElementById("cycleTitle").innerText = t.cycle;
document.getElementById("noteTitle").innerText = t.noteTitle;

// 输入框
document.getElementById("note").placeholder = t.note;

// 按钮
document.getElementById("backBtn").innerText = t.back;
document.getElementById("saveBtn").innerText = t.save;
document.getElementById("deleteBtn").innerText = t.delete;

// mood
document.getElementById("moodHappy").innerText = t.happy;
document.getElementById("moodOk").innerText = t.ok;
document.getElementById("moodSad").innerText = t.sad;

// body
document.getElementById("bodyShiny").innerText = t.shiny;
document.getElementById("bodyCalm").innerText = t.calm;
document.getElementById("bodyTired").innerText = t.tired;

// cycle
document.getElementById("cycleSoon").innerText = t.soon;

// greeting
let name = localStorage.getItem("name");
if(name){
  document.getElementById("greeting").innerText = name + "，" + t.greeting;
}

}
</script>

</body>
</html>
